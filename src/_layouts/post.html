<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Swopnil Shrestha</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/favicon.png" type="image/png">
    <style>
        .blog-container {
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .blog-nav {
            margin-bottom: 1.5rem;
        }
        .blog-nav a {
            margin-right: 1rem;
        }
        .blog-header {
            margin-bottom: 2.5rem;
        }
        .blog-header h1 {
            margin-bottom: 0.5rem;
            margin-top: 0;
        }
        .blog-meta {
            color: #666;
            font-size: 0.9rem;
        }
        .blog-content {
            line-height: 1.7;
        }
        @media (prefers-color-scheme: dark) {
            .blog-meta {
                color: #999;
            }
        }
    </style>
</head>
<body>
    <main class="blog-container">
        <nav class="blog-nav">
            <a href="/">about</a>
            <a href="/blog">blog</a>
            <a href="/work">work</a>
            <a href="/feed.xml">rss</a>
        </nav>
        <article>
            <header class="blog-header">
                <h1>{{ title }}</h1>
                <div class="blog-meta">
                    <time datetime="{{ date }}">{{ date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) }}</time>
                </div>
            </header>
            <div class="blog-content">
                {{ content | safe }}
            </div>
        </article>
    </main>
    <footer class="site-footer">
        <div>
            <a href="https://github.com/swopnilnep" target="_blank">github</a>
            <a href="https://linkedin.com/in/swopnilnep" target="_blank">linkedin</a>
            <a href="/keys">pgp</a>
        </div>
        <div class="footer-site">swopnil.com</div>
    </footer>
</body>
</html>
