<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Swopnil Shrestha</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/favicon.png" type="image/png">
    <style>
        .blog-list {
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .blog-nav {
            margin-bottom: 2rem;
        }
        .blog-nav a {
            margin-right: 1rem;
        }
        .blog-list h1 {
            margin-bottom: 0.5rem;
            margin-top: 0;
        }
        .post-item {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #e1e4e8;
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-title {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
            margin-top: 0;
            font-weight: 600;
        }
        .post-title a {
            color: inherit;
        }
        .post-date {
            color: #666;
            font-size: 0.9rem;
        }
        @media (prefers-color-scheme: dark) {
            .post-item {
                border-bottom-color: #30363d;
            }
            .post-date {
                color: #8b949e;
            }
        }
    </style>
</head>
<body>
    <main class="blog-list">
        <nav class="blog-nav">
            <a href="/">about</a>
            <a href="/blog">blog</a>
            <a href="/work">work</a>
            <a href="/feed.xml">rss</a>
        </nav>
        <h1>Blog</h1>
        <div style="margin-top: 2rem;">
        {%- for post in collections.post | reverse -%}
        <div class="post-item">
            <h2 class="post-title">
                <a href="{{ post.url }}">{{ post.data.title }}</a>
            </h2>
            <div class="post-date">{{ post.date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) }}</div>
        </div>
        {%- endfor -%}
        </div>
    </main>
    <footer class="site-footer">
        <div>
            <a href="https://github.com/swopnilnep" target="_blank">github</a>
            <a href="https://linkedin.com/in/swopnilnep" target="_blank">linkedin</a>
            <a href="/keys">pgp</a>
        </div>
        <div class="footer-site">swopnil.com</div>
    </footer>
</body>
</html>
